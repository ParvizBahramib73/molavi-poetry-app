name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# مجوزهای لازم برای انتشار روی GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# اجازهٔ یک دیپلوی هم‌زمان؛ اجراهای در صف لغو نمی‌شوند تا کامل شوند
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build (production, project base-href)
        run: npm run build -- --configuration=production --base-href=/molavi-poetry-app/

      - name: Add SPA fallback (404.html = index.html)
        run: cp dist/molavi-poetry-app/browser/index.html dist/molavi-poetry-app/browser/404.html

      - name: Disable Jekyll processing
        run: touch dist/molavi-poetry-app/browser/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/molavi-poetry-app/browser

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
